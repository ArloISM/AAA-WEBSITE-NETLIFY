backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "homepage"
    label: "Homepage"
    files:
      - label: "Homepage Content"
        name: "home"
        file: "content/home.json"
        description: "Every headline, paragraph and label on the homepage. HTML hint: <span class='light'>..</span> = grey, <span class='red'>..</span> or <em>..</em> = red, <span class='dim'>..</span> = muted."
        fields:
          - { label: "Hero — Eyebrow", name: "hero_eyebrow", widget: "string" }
          - { label: "Hero — Heading", name: "hero_heading", widget: "string" }
          - { label: "Hero — Tagline", name: "hero_tagline", widget: "text" }

          - { label: "Attachments — Label", name: "attach_label", widget: "string" }
          - { label: "Attachments — Heading", name: "attach_heading", widget: "string" }
          - { label: "Attachments — Intro", name: "attach_intro", widget: "text" }

          - { label: "Fleet — Label", name: "fleet_label", widget: "string" }
          - { label: "Fleet — Heading", name: "fleet_heading", widget: "string" }
          - { label: "Fleet — Intro", name: "fleet_intro", widget: "text" }
          - { label: "Fleet — Scroll Hint", name: "fleet_hint", widget: "string" }

          - { label: "About — Label", name: "about_label", widget: "string" }
          - { label: "About — Statement", name: "about_statement", widget: "string" }
          - { label: "About — Body", name: "about_body", widget: "text" }
          - { label: "About — Founder Name", name: "about_founder_name", widget: "string" }
          - { label: "About — Founder Role", name: "about_founder_role", widget: "string" }

          - { label: "Stat 1 — Number", name: "stat1_num", widget: "string" }
          - { label: "Stat 1 — Caption", name: "stat1_cap", widget: "string" }
          - { label: "Stat 2 — Number", name: "stat2_num", widget: "string" }
          - { label: "Stat 2 — Caption", name: "stat2_cap", widget: "string" }
          - { label: "Stat 3 — Number", name: "stat3_num", widget: "string" }
          - { label: "Stat 3 — Caption", name: "stat3_cap", widget: "string" }
          - { label: "Stat 4 — Number", name: "stat4_num", widget: "string" }
          - { label: "Stat 4 — Caption", name: "stat4_cap", widget: "string" }

          - { label: "Brands — Label", name: "brands_label", widget: "string" }

          - { label: "Services — Label", name: "svc_label", widget: "string" }
          - { label: "Services — Heading", name: "svc_heading", widget: "string" }
          - { label: "Services — Intro", name: "svc_intro", widget: "text" }
          - { label: "Service 1 — Index", name: "svc1_idx", widget: "string" }
          - { label: "Service 1 — Title", name: "svc1_title", widget: "string" }
          - { label: "Service 1 — Body", name: "svc1_body", widget: "text" }
          - { label: "Service 2 — Index", name: "svc2_idx", widget: "string" }
          - { label: "Service 2 — Title", name: "svc2_title", widget: "string" }
          - { label: "Service 2 — Body", name: "svc2_body", widget: "text" }
          - { label: "Service 3 — Index", name: "svc3_idx", widget: "string" }
          - { label: "Service 3 — Title", name: "svc3_title", widget: "string" }
          - { label: "Service 3 — Body", name: "svc3_body", widget: "text" }
          - { label: "Service 4 — Index", name: "svc4_idx", widget: "string" }
          - { label: "Service 4 — Title", name: "svc4_title", widget: "string" }
          - { label: "Service 4 — Body", name: "svc4_body", widget: "text" }

          - { label: "Gallery — Label", name: "gallery_label", widget: "string" }
          - { label: "Gallery — Heading", name: "gallery_heading", widget: "string" }
          - { label: "Gallery — Hint", name: "gallery_hint", widget: "string" }

          - { label: "CTA — Heading", name: "cta_heading", widget: "string" }
          - { label: "CTA — Body", name: "cta_body", widget: "text" }

          - { label: "Contact Email", name: "contact_email", widget: "string" }
          - { label: "Contact Phone", name: "contact_phone", widget: "string" }
          - { label: "Location", name: "location", widget: "string" }

  - name: "equipment"
    label: "All Equipment"
    files:
      - label: "Equipment, Vehicles & Services"
        name: "equipment"
        file: "content/equipment.json"
        description: "Every attachment, telehandler, plant item, vehicle and service. Add tags to bundle items by brand or capability."
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            label_singular: "Item"
            summary: "{{fields.name}} — {{fields.category}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Page Slug", name: "slug", widget: "string", required: false, hint: "URL for this item's detail page, e.g. magni-panning-head. Leave blank to auto-generate from the name." }
              - label: "Category"
                name: "category"
                widget: "select"
                options: ["Attachments", "Telehandlers", "Plant Hire", "Vehicles", "Services"]
              - label: "Brand"
                name: "brand"
                widget: "select"
                options: ["Romastor", "Magni", "Manitou", "Merlo", "Atlas Copco", "Hyundai", "Hino", "Scania", "Volvo", "AAA"]
              - { label: "Spec Label", name: "spec", widget: "string", required: false, hint: "Short headline spec, e.g. 6T · 26M" }
              - { label: "Short Description", name: "description", widget: "text", hint: "One line shown on cards." }
              - { label: "Long Description", name: "long_description", widget: "text", required: false, hint: "Deeper description shown on the item detail page." }
              - { label: "Image / GIF", name: "image", widget: "image", required: false, hint: "Leave empty to show an AAA placeholder tile." }
              - label: "Detailed Specifications"
                name: "specs"
                widget: "list"
                required: false
                label_singular: "Spec"
                summary: "{{fields.label}}: {{fields.value}}"
                hint: "Detailed spec rows shown in the item page spec table."
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Value", name: "value", widget: "string" }
              - label: "Media (slideshow)"
                name: "media"
                widget: "list"
                required: false
                label_singular: "Media item"
                summary: "{{fields.kind}}: {{fields.caption}}"
                hint: "Extra images, videos (YouTube/Vimeo/MP4) and PDF spec sheets shown in the item-page slideshow. Tag-matched gallery images are added automatically."
                fields:
                  - label: "Type"
                    name: "kind"
                    widget: "select"
                    options: ["image", "video", "pdf"]
                  - { label: "URL", name: "url", widget: "string", hint: "Image/PDF URL or YouTube/Vimeo/MP4 link." }
                  - { label: "Caption", name: "caption", widget: "string", required: false }
              - label: "Tags"
                name: "tags"
                widget: "list"
                default: []
                hint: "Tags drive filtering & bundling. Add brand names (magni, manitou) so this item bundles with matching machines and gallery images. Also add capabilities (panning, tilt, 6t, rigging)."
              - { label: "Display Order", name: "order", widget: "number", default: 1, value_type: "int" }

  - name: "gallery"
    label: "Image Gallery"
    files:
      - label: "Gallery Images"
        name: "gallery"
        file: "content/gallery.json"
        description: "On-set and field imagery. Tag each image with the brands featured (e.g. magni, manitou) so it bundles into that brand's filter view."
        fields:
          - label: "Images"
            name: "images"
            widget: "list"
            label_singular: "Image"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title / Caption", name: "title", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
              - label: "Tags"
                name: "tags"
                widget: "list"
                default: []
                hint: "Tag with the brands or machines featured in this photo (magni, manitou) plus context (onset, fleet, fabrication)."
              - { label: "Display Order", name: "order", widget: "number", default: 1, value_type: "int" }
